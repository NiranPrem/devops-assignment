groups:
- name: production-platform-alerts
  rules:

  - alert: DeploymentDown
    expr: kube_deployment_status_replicas_available{deployment="api"} < 1
    for: 30s
    labels:
      severity: critical
      environment: production
    annotations:
      summary: API Deployment Down
      description: API deployment has no available replicas

  - alert: APIPodNotReady
    expr: kube_deployment_status_replicas_unavailable{deployment="api"} > 0
    for: 30s
    labels:
      severity: warning
      environment: production
    annotations:
      summary: API Pod Not Ready
      description: One or more API replicas are unavailable

  - alert: PodCrashLooping
    expr: increase(kube_pod_container_status_restarts_total[10m]) > 3
    for: 5m
    labels:
      severity: critical
      environment: production
    annotations:
      summary: Pod restarting repeatedly
      description: Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} restarted more than 3 times in 10 minutes.

  - alert: PodNotReady
    expr: kube_pod_status_ready{condition="true"} == 0
    for: 10m
    labels:
      severity: critical
      environment: production
    annotations:
      summary: Pod not ready
      description: Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready.

  - alert: DeploymentReplicasMismatch
    expr: kube_deployment_status_replicas_available < kube_deployment_spec_replicas
    for: 10m
    labels:
      severity: warning
      environment: production
    annotations:
      summary: Deployment unhealthy
      description: Deployment {{ $labels.deployment }} has unavailable replicas.

  - alert: HighNodeCPUUsage
    expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 10m
    labels:
      severity: critical
      environment: production
    annotations:
      summary: High CPU usage
      description: Node CPU utilization is above 80%.

  - alert: HighNodeMemoryUsage
    expr: ((node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes) * 100 > 85
    for: 10m
    labels:
      severity: critical
      environment: production
    annotations:
      summary: High memory usage
      description: Node memory utilization is above 85%.

  - alert: PVCSpaceRunningLow
    expr: (kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes) * 100 < 15
    for: 15m
    labels:
      severity: warning
      environment: production
    annotations:
      summary: PVC space low
      description: PVC {{ $labels.persistentvolumeclaim }} has less than 15% free space remaining.

  - alert: TargetDown
    expr: up == 0
    for: 5m
    labels:
      severity: critical
      environment: production
    annotations:
      summary: Monitoring target down
      description: Target {{ $labels.job }} is unreachable.

  - alert: ExcessiveContainerRestarts
    expr: increase(kube_pod_container_status_restarts_total[30m]) > 5
    for: 5m
    labels:
      severity: critical
      environment: production
    annotations:
      summary: Excessive container restarts
      description: Container in pod {{ $labels.pod }} is restarting frequently.
