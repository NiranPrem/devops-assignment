apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
        tier: frontend
    spec:
      containers:
        - name: web
          image: devops-assignment/web:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: API_URL
              value: "http://api"
