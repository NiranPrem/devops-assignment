apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dev

resources:
  - ../../base

commonLabels:
  environment: dev

patches:
  # Single replica for dev
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: api
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
    target:
      kind: Deployment
      name: web

  # Dev password
  - patch: |-
      - op: replace
        path: /stringData/POSTGRES_PASSWORD
        value: "dev-password-change-me"
    target:
      kind: Secret
      name: postgres-secret

images:
  - name: devops-assignment/api
    newTag: latest
  - name: devops-assignment/web
    newTag: latest
